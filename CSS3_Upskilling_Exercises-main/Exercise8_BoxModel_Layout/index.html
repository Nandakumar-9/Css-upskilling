<!DOCTYPE html>
<html>
<head>
    <title>Box Model and Layout Control</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>

    <h1>Community Event Portal</h1>

    <div class="eventCard">
        <h2>Music Festival</h2>
        <p>Enjoy live music and entertainment.</p>
    </div>

    <div class="eventCard">
        <h2>Sports Meet</h2>
        <p>Participate in exciting sports activities.</p>
    </div>

    <form>
        <label>Name:</label>
        <input type="text" class="selectedField">
    </form>

    <p class="hiddenText">
        This text uses visibility:hidden
    </p>

    <p class="removedText">
        This text uses display:none
    </p>

</body>
</html>
